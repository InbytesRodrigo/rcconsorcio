<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Consórcio - Alto Padrão</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rf: {
                            red: '#b91c1c', // red-700
                            dark: '#0f172a', // slate-900
                            light: '#f8fafc', // slate-50
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (Premium Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configuração do Babel para evitar o erro jsx-runtime -->
    <script>
        Babel.registerPreset('my-react', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>

    <!-- FIREBASE SETUP (Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Sua configuração (Será usada no Netlify)
        const myFirebaseConfig = {
            apiKey: "AIzaSyDp9WFzPuRdDc9zbqlJN_l0S6ZMi0LKiYI",
            authDomain: "rfconsorcio.firebaseapp.com",
            projectId: "rfconsorcio",
            storageBucket: "rfconsorcio.firebasestorage.app",
            messagingSenderId: "490627588695",
            appId: "1:490627588695:web:0e4225684a27df737ff912",
            measurementId: "G-70X47ZPPDR"
        };

        // Detecta se está no ambiente de visualização ou no seu domínio (Netlify)
        const isPreviewEnv = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isPreviewEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Expondo para o React usar
        window.db = db;
        window.auth = auth;
        window.fb = { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, onSnapshot };
        window.fbAuth = { signInAnonymously, onAuthStateChanged, signInWithCustomToken };
        
        // Avisa o React que o Firebase carregou
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* Range slider styling */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #0f172a; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); border: 2px solid #fff; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e2e8f0; border-radius: 4px; }
        /* Loader */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #b91c1c; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Remove arrows from number input */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        /* Hide scrollbar for tabs on mobile */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="env,my-react">
        const { useState, useEffect, useRef } = React;

        // --- UTILIDADES ---
        const formatCurrency = (value) => {
            if (!value) return 'R$ 0,00';
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        };

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            if (!file) return resolve(null);
            if (file.size > 1048576) { // 1MB limite
                alert("A imagem é muito grande. Escolha uma imagem de até 1MB.");
                reject("Arquivo muito grande");
                return;
            }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        const safeColor = (color, fallback = '#ffffff') => {
            return (color && /^#[0-9A-F]{6}$/i.test(color)) ? color : fallback;
        };

        const StatusBadge = ({ status, settings }) => {
            const defaultStatuses = [
                { name: 'Disponível', color: '#10b981' },
                { name: 'Contemplada', color: '#8b5cf6' },
                { name: 'Reservada', color: '#f59e0b' }
            ];
            
            const statusesList = (settings && settings.statuses && settings.statuses.length > 0) ? settings.statuses : defaultStatuses;
            const statusObj = statusesList.find(s => s.name === status);
            const bgColor = statusObj ? statusObj.color : '#64748b'; 
            
            return (
                <span 
                    className="inline-flex items-center px-2.5 py-1.5 rounded-md text-[11px] font-bold uppercase tracking-wider text-white shadow-sm whitespace-nowrap" 
                    style={{ backgroundColor: safeColor(bgColor, '#64748b') }}
                >
                    {status}
                </span>
            );
        };

        const initialSettings = {
            adminPhone: '5511999999999',
            companyName: 'RF Consórcio',
            cnpj: '00.000.000/0001-00',
            heroTitle: 'O poder de compra que você precisa, com a segurança que você merece.',
            heroSubtitle: 'Simule agora seu crédito para imóveis ou veículos com as taxas mais competitivas do mercado premium.',
            aboutText: 'A RF Consórcio é especialista em cartas contempladas de alto padrão. Garantimos transparência, agilidade e segurança jurídica em todas as negociações para a realização do seu patrimônio.',
            mainLogo: null,
            heroImage: null,
            partnerLogos: [],
            headerBgColor: '#ffffff', // Cor da barra de menu
            statuses: [
                { name: 'Disponível', color: '#10b981' },
                { name: 'Contemplada', color: '#8b5cf6' },
                { name: 'Reservada', color: '#f59e0b' }
            ],
            funnelMinCredit: 200000,
            funnelMaxCredit: 6000000,
            funnelMinInstallment: 1000,
            funnelMaxInstallment: 50000,
            evolutionApiUrl: 'https://evolution.bewe.com.br',
            evolutionApiKey: 'WgDbeKI1SdLhBVllTrpbneFXQt5OiZD3hJc66riSastgY8R675bbf07eb479',
            evolutionInstance: '',
            evolutionMessage: 'Olá {nome}, recebemos sua simulação de consórcio em nosso site no valor de {credito}. Como posso ajudar?'
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [firebaseReady, setFirebaseReady] = useState(!!window.db);
            const [user, setUser] = useState(null);
            const [firebaseError, setFirebaseError] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminAuth, setAdminAuth] = useState(false);
            
            const [letters, setLetters] = useState([]);
            const [leads, setLeads] = useState([]);
            const [settings, setSettings] = useState(initialSettings);
            const [loadingData, setLoadingData] = useState(true);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'rf-consorcio-default';

            useEffect(() => {
                const handleReady = () => setFirebaseReady(true);
                window.addEventListener('firebase-ready', handleReady);
                if (window.db) setFirebaseReady(true);
                return () => window.removeEventListener('firebase-ready', handleReady);
            }, []);

            // Iniciar Autenticação do Firebase
            useEffect(() => {
                if (!firebaseReady) return;
                
                const initAuth = async () => {
                    try {
                        const isPreviewEnv = typeof __firebase_config !== 'undefined';
                        
                        if (isPreviewEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.fbAuth.signInWithCustomToken(window.auth, __initial_auth_token);
                        } else {
                            await window.fbAuth.signInAnonymously(window.auth);
                        }
                    } catch (error) {
                        console.error("Erro na autenticação:", error);
                    }
                };
                
                initAuth();

                const unsubscribe = window.fbAuth.onAuthStateChanged(window.auth, setUser);

                return () => unsubscribe();
            }, [firebaseReady]);

            // Carregar Dados do Firestore
            useEffect(() => {
                if (!firebaseReady || !user) return;

                const db = window.db;
                const { collection, onSnapshot, doc, setDoc } = window.fb;

                // Paths seguros
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                const lettersRef = collection(db, 'artifacts', appId, 'public', 'data', 'letters');
                const leadsRef = collection(db, 'artifacts', appId, 'public', 'data', 'leads');

                const handleError = (error, context) => {
                    console.error(`Erro ao ler ${context}:`, error);
                    if (error.code === 'permission-denied') {
                        setFirebaseError("O Firebase está bloqueando o acesso por segurança.\n\nPara funcionar no seu domínio (Netlify), acesse o painel do Firebase > Firestore Database > aba 'Regras' e cole o seguinte código:\n\nmatch /{document=**} {\n  allow read, write: if true;\n}");
                    }
                    setLoadingData(false);
                };

                // 1. Ouvir Configurações
                const unsubSettings = onSnapshot(settingsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setSettings({ ...initialSettings, ...docSnap.data() });
                    } else {
                        setDoc(settingsRef, initialSettings).catch(e => console.log("Erro ao inicializar settings", e));
                    }
                }, (error) => handleError(error, 'settings'));

                // 2. Ouvir Cartas
                const unsubLetters = onSnapshot(lettersRef, (snapshot) => {
                    const lettersData = [];
                    snapshot.forEach((doc) => lettersData.push({ id: doc.id, ...doc.data() }));
                    lettersData.sort((a, b) => b.credit - a.credit);
                    setLetters(lettersData);
                }, (error) => handleError(error, 'cartas'));

                // 3. Ouvir Leads
                const unsubLeads = onSnapshot(leadsRef, (snapshot) => {
                    const leadsData = [];
                    snapshot.forEach((doc) => leadsData.push({ id: doc.id, ...doc.data() }));
                    leadsData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    setLeads(leadsData);
                    setLoadingData(false);
                }, (error) => handleError(error, 'leads'));

                return () => {
                    unsubSettings();
                    unsubLetters();
                    unsubLeads();
                };
            }, [firebaseReady, user]);

            // Funções de Banco de Dados
            const handleAddLead = async (leadData) => {
                if (!firebaseReady || !user) return;
                try {
                    await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', appId, 'public', 'data', 'leads'), leadData);
                } catch (e) { console.error("Erro ao salvar lead", e); }
            };

            const handleSaveSettings = async (newSettings) => {
                if (!firebaseReady || !user) return;
                try {
                    await window.fb.setDoc(window.fb.doc(window.db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), newSettings);
                } catch (e) { console.error("Erro ao salvar configs", e); }
            };

            const handleAddLetter = async (letterData) => {
                if (!firebaseReady || !user) return;
                try {
                    await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', appId, 'public', 'data', 'letters'), letterData);
                } catch (e) { console.error("Erro ao salvar carta", e); }
            };

            const handleUpdateLetter = async (id, updatedData) => {
                if (!firebaseReady || !user) return;
                try {
                    await window.fb.updateDoc(window.fb.doc(window.db, 'artifacts', appId, 'public', 'data', 'letters', id), updatedData);
                } catch (e) { console.error("Erro ao atualizar carta", e); }
            };

            const handleDeleteLetter = async (id) => {
                if (!firebaseReady || !user) return;
                try {
                    await window.fb.deleteDoc(window.fb.doc(window.db, 'artifacts', appId, 'public', 'data', 'letters', id));
                } catch (e) { console.error("Erro ao deletar carta", e); }
            };

            // Tela de Erro de Permissão do Firebase
            if (firebaseError) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                        <div className="bg-white rounded-xl shadow-lg border border-slate-200 p-8 max-w-lg w-full text-center">
                            <i className="ph ph-warning-circle text-5xl text-rf-red mb-4 inline-block"></i>
                            <h2 className="text-xl font-semibold text-slate-900 mb-4">Ação Necessária no Firebase</h2>
                            <p className="text-slate-600 text-sm mb-6 text-left whitespace-pre-wrap bg-slate-50 p-4 rounded border border-slate-200 font-mono leading-relaxed">
                                {firebaseError}
                            </p>
                            <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white py-3 rounded font-medium hover:bg-slate-800 transition">
                                Já atualizei as regras, recarregar site
                            </button>
                        </div>
                    </div>
                );
            }

            if (!firebaseReady || loadingData) {
                return <div className="min-h-screen flex items-center justify-center bg-slate-50 flex-col gap-4">
                    <div className="loader"></div>
                    <p className="text-slate-500 text-sm font-medium">Conectando ao banco de dados...</p>
                </div>;
            }

            if (isAdmin) {
                if (!adminAuth) return <AdminLogin onLogin={() => setAdminAuth(true)} onBack={() => setIsAdmin(false)} />;
                return <AdminPanel 
                    letters={letters} 
                    onAddLetter={handleAddLetter}
                    onUpdateLetter={handleUpdateLetter}
                    onDeleteLetter={handleDeleteLetter}
                    leads={leads} 
                    settings={settings} 
                    onSaveSettings={handleSaveSettings} 
                    onLogout={() => { setAdminAuth(false); setIsAdmin(false); }} 
                />;
            }

            return <ClientInterface letters={letters} settings={settings} addLead={handleAddLead} onAdminClick={() => setIsAdmin(true)} />;
        }

        // ==========================================
        // 1. INTERFACE DO CLIENTE (FRONTEND PREMIUM)
        // ==========================================
        function ClientInterface({ letters, settings, addLead, onAdminClick }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [categoryFilter, setCategoryFilter] = useState('Todas');
            const [typeFilter, setTypeFilter] = useState('Todas'); 
            const [selectedLetter, setSelectedLetter] = useState(null);

            const filteredLetters = letters.filter(l => {
                const matchSearch = l.code?.includes(searchTerm) || l.category?.toLowerCase().includes(searchTerm.toLowerCase()) || l.adm?.toLowerCase().includes(searchTerm.toLowerCase());
                const matchCategory = categoryFilter === 'Todas' || l.category === categoryFilter;
                
                const actualType = l.tipoCota || 'Contemplada'; 
                const matchType = typeFilter === 'Todas' || 
                                  (typeFilter === 'Contempladas' && actualType === 'Contemplada') || 
                                  (typeFilter === 'Em Andamento' && actualType === 'Em Andamento') ||
                                  (typeFilter === 'Deságio' && actualType === 'Deságio');

                return matchSearch && matchCategory && matchType;
            });

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {/* Header Modificado com Cor Personalizável e Logo + Nome Juntos */}
                    <header style={{ backgroundColor: safeColor(settings.headerBgColor, '#ffffff') }} className="border-b border-slate-200 sticky top-0 z-50 transition-all shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                {settings.mainLogo && (
                                    <img src={settings.mainLogo} alt="Logo" className="h-14 md:h-16 object-contain drop-shadow-sm" />
                                )}
                                <div className="flex items-center gap-2">
                                    {!settings.mainLogo && <i className="ph ph-buildings text-2xl text-rf-red"></i>}
                                    <span className="text-xl md:text-2xl font-bold tracking-tight text-slate-900 uppercase">
                                        {settings.companyName.split(' ')[0]} <span className="text-rf-red font-light">{settings.companyName.split(' ').slice(1).join(' ')}</span>
                                    </span>
                                </div>
                            </div>
                            <div className="hidden md:flex items-center gap-8">
                                <a href="#simulador" className="text-sm font-medium text-slate-700 hover:text-rf-red transition-colors">Oportunidades</a>
                                <a href="#sobre" className="text-sm font-medium text-slate-700 hover:text-rf-red transition-colors">A Empresa</a>
                                <a href={`https://wa.me/${settings.adminPhone}`} target="_blank" rel="noreferrer" 
                                className="bg-rf-red text-white px-5 py-2.5 rounded text-sm font-medium hover:bg-red-800 transition-colors flex items-center gap-2 shadow-sm">
                                    <i className="ph ph-whatsapp-logo text-lg"></i> Fale Conosco
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* Hero Section */}
                    <section className="relative bg-rf-dark text-white pt-20 pb-28 overflow-hidden">
                        {settings.heroImage && (
                            <div className="absolute inset-0 z-0 opacity-40">
                                <img src={settings.heroImage} alt="Fundo" className="w-full h-full object-cover" />
                                <div className="absolute inset-0 bg-rf-dark/60 mix-blend-multiply"></div>
                            </div>
                        )}
                        <div className="max-w-7xl mx-auto px-6 relative z-10">
                            <div className="grid lg:grid-cols-2 gap-16 items-center">
                                {/* Textos */}
                                <div className="text-center lg:text-left drop-shadow-lg">
                                    <h1 className="text-4xl md:text-5xl font-semibold mb-6 leading-tight text-white tracking-tight">
                                        {settings.heroTitle}
                                    </h1>
                                    <p className="text-lg text-slate-200 mb-8 max-w-xl mx-auto lg:mx-0 leading-relaxed font-light">
                                        {settings.heroSubtitle}
                                    </p>
                                    <div className="flex flex-col sm:flex-row gap-6 justify-center lg:justify-start">
                                        <div className="flex items-center gap-2 text-white text-sm font-medium bg-black/30 px-4 py-2 rounded-lg backdrop-blur-sm border border-white/10">
                                            <i className="ph ph-medal text-xl text-rf-red"></i> Especialistas em Alto Padrão
                                        </div>
                                        <div className="flex items-center gap-2 text-white text-sm font-medium bg-black/30 px-4 py-2 rounded-lg backdrop-blur-sm border border-white/10">
                                            <i className="ph ph-shield-check text-xl text-rf-red"></i> Negociação Segura
                                        </div>
                                    </div>
                                </div>

                                {/* Funil de Simulação */}
                                <div className="w-full max-w-md mx-auto lg:ml-auto">
                                    <SimulatorFunnel settings={settings} onSubmit={(data) => addLead({...data, type: 'Funil', timestamp: new Date().toISOString()})} />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Tabela de Cartas e Cards Mobile */}
                    <section id="simulador" className="py-20 max-w-7xl mx-auto px-6 w-full flex-1">
                        <div className="mb-10 flex flex-col lg:flex-row justify-between items-start lg:items-end gap-6 border-b border-slate-200 pb-6">
                            <div>
                                <h2 className="text-3xl font-bold text-slate-900 mb-2 tracking-tight">Oportunidades Disponíveis</h2>
                                <p className="text-slate-500 font-medium text-lg">Filtre e selecione a opção ideal para o seu momento financeiro.</p>
                            </div>
                            
                            {/* Filtros Duplos e Busca */}
                            <div className="flex flex-col lg:flex-row gap-4 w-full lg:w-auto">
                                <div className="flex flex-col sm:flex-row gap-4 overflow-x-auto hide-scrollbar pb-2 lg:pb-0">
                                    {/* Aba de Tipo de Carta com Deságio */}
                                    <div className="flex bg-slate-100 p-1 rounded-md border border-slate-200 shrink-0">
                                        {['Todas', 'Contempladas', 'Em Andamento', 'Deságio'].map(type => (
                                            <button 
                                                key={type} onClick={() => setTypeFilter(type)}
                                                className={`px-4 py-2 rounded text-sm font-bold transition-colors ${typeFilter === type ? 'bg-white text-rf-dark shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-800'}`}
                                            >
                                                {type}
                                            </button>
                                        ))}
                                    </div>
                                    
                                    {/* Aba de Categoria */}
                                    <div className="flex bg-slate-100 p-1 rounded-md border border-slate-200 shrink-0">
                                        {['Todas', 'Imóvel', 'Veículo', 'Serviço'].map(cat => (
                                            <button 
                                                key={cat} onClick={() => setCategoryFilter(cat)}
                                                className={`px-4 py-2 rounded text-sm font-bold transition-colors ${categoryFilter === cat ? 'bg-white text-rf-dark shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-800'}`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="relative w-full lg:w-64 shrink-0">
                                    <i className="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                    <input 
                                        type="text" placeholder="Procurar código ou banco..." 
                                        className="pl-10 pr-4 py-2.5 w-full bg-white border border-slate-200 rounded-md text-slate-900 text-sm font-medium focus:border-rf-red focus:ring-1 focus:ring-rf-red outline-none transition-colors"
                                        value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* DESKTOP: Visualização em Tabela com Cores da Identidade */}
                        <div className="hidden md:block bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-rf-dark text-white border-b-4 border-rf-red">
                                    <tr className="text-xs uppercase tracking-wider">
                                        <th className="px-6 py-5 font-bold">Administradora</th>
                                        <th className="px-6 py-5 font-bold">Código</th>
                                        <th className="px-6 py-5 font-bold">Crédito</th>
                                        <th className="px-6 py-5 font-bold">Entrada</th>
                                        <th className="px-6 py-5 font-bold">Parcelas</th>
                                        <th className="px-6 py-5 font-bold">Status</th>
                                        <th className="px-6 py-5 font-bold text-right">Ação</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredLetters.length === 0 ? (

        // ==========================================
        // COMPONENTE: FUNIL DE SIMULAÇÃO 
        // ==========================================
        function SimulatorFunnel({ settings, onSubmit }) {
            const minC = Number(settings.funnelMinCredit || 200000);
            const maxC = Number(settings.funnelMaxCredit || 6000000);
            const minI = Number(settings.funnelMinInstallment || 1000);
            const maxI = Number(settings.funnelMaxInstallment || 50000);
            const adminPhone = settings.adminPhone;

            const [step, setStep] = useState(1);
            const [credit, setCredit] = useState(minC + (maxC - minC) / 2);
            const [installment, setInstallment] = useState(minI + (maxI - minI) / 2); 
            const [name, setName] = useState('');
            const [phone, setPhone] = useState('');
            const [loading, setLoading] = useState(false);

            const handleFinish = (e) => {
                e.preventDefault();
                setLoading(true);
                onSubmit({ name, phone, desiredCredit: credit, desiredInstallment: installment });
                
                const msg = `*SIMULAÇÃO PREMIUM*\n\nOlá, sou *${name}* e realizei uma simulação no site.\n\n🎯 *Meu Interesse:*\n- Crédito: *${formatCurrency(credit)}*\n- Parcela: *${formatCurrency(installment)}*\n\nAguardo as opções disponíveis. Contato: ${phone}.`;
                setTimeout(() => {
                    window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(msg)}`, '_blank');
                    setLoading(false); setStep(4);
                }, 800);
            };

            return (
                <div className="bg-white rounded-2xl shadow-2xl p-8 relative overflow-hidden border border-slate-100">
                    {step < 4 && (
                        <div className="flex gap-2 mb-8">
                            {[1,2,3].map(i => <div key={i} className={`h-1.5 flex-1 rounded-full ${step >= i ? 'bg-rf-red' : 'bg-slate-100'}`}></div>)}
                        </div>
                    )}

                    {step === 1 && (
                        <div className="animate-in fade-in duration-300">
                            <h3 className="text-xl font-bold text-slate-900 mb-1">Valor do Crédito</h3>
                            <p className="text-slate-500 text-sm mb-8 font-medium">Defina o montante desejado.</p>
                            <div className="mb-8 text-center"><span className="text-4xl font-black text-slate-900 tracking-tight">{formatCurrency(credit)}</span></div>
                            <input type="range" min={minC} max={maxC} step="5000" value={credit} onChange={(e) => setCredit(Number(e.target.value))} className="w-full mb-6" />
                            <div className="flex justify-between text-xs text-slate-400 mb-8 font-bold"><span>{formatCurrency(minC)}</span><span>{formatCurrency(maxC)}</span></div>
                            <button onClick={() => setStep(2)} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-rf-red transition-colors shadow-md hover:shadow-lg">Continuar</button>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="animate-in fade-in duration-300">
                            <div className="flex items-center gap-2 mb-1">
                                <button onClick={()=>setStep(1)} className="text-slate-400 hover:text-slate-900"><i className="ph ph-caret-left text-xl"></i></button>
                                <h3 className="text-xl font-bold text-slate-900">Parcela Mensal</h3>
                            </div>
                            <p className="text-slate-500 text-sm mb-8 font-medium ml-7">Adapte ao seu planejamento.</p>
                            <div className="mb-8 text-center"><span className="text-4xl font-black text-slate-900 tracking-tight">{formatCurrency(installment)}</span></div>
                            <input type="range" min={minI} max={maxI} step="100" value={installment} onChange={(e) => setInstallment(Number(e.target.value))} className="w-full mb-6" />
                            <div className="flex justify-between text-xs text-slate-400 mb-8 font-bold"><span>{formatCurrency(minI)}</span><span>{formatCurrency(maxI)}</span></div>
                            <button onClick={() => setStep(3)} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-rf-red transition-colors shadow-md hover:shadow-lg">Avançar</button>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="animate-in fade-in duration-300">
                            <div className="flex items-center gap-2 mb-6">
                                <button onClick={()=>setStep(2)} className="text-slate-400 hover:text-slate-900"><i className="ph ph-caret-left text-xl"></i></button>
                                <h3 className="text-xl font-bold text-slate-900">Contato</h3>
                            </div>
                            <form onSubmit={handleFinish} className="space-y-4">
                                <input required type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-slate-50 text-slate-900 font-medium border border-slate-200 rounded-xl p-4 focus:border-rf-red focus:ring-1 focus:ring-rf-red outline-none text-sm transition-all" placeholder="Nome completo" />
                                <input required type="tel" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full bg-slate-50 text-slate-900 font-medium border border-slate-200 rounded-xl p-4 focus:border-rf-red focus:ring-1 focus:ring-rf-red outline-none text-sm transition-all" placeholder="WhatsApp (com DDD)" />
                                <button type="submit" disabled={loading} className="w-full bg-[#25D366] hover:bg-[#128C7E] text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 mt-4 shadow-md hover:shadow-lg">

                            <p className="text-xs text-center text-slate-400 mt-4 flex items-center justify-center gap-1 font-medium"><i className="ph ph-lock-key"></i> Seus dados estão protegidos conosco.</p>

                    {step === 4 && (

            );
        }

        // --- SUB-TABS ADMIN ---
        function AdminLeads({ leads, settings }) {
            const [sendingMsg, setSendingMsg] = useState(null);

            const sendEvolutionMessage = async (lead) => {
                if (!settings.evolutionInstance || !settings.evolutionApiKey || !settings.evolutionApiUrl) {
                    alert("Atenção! Vá em 'Site & Config.' e preencha a URL, a Chave e o Nome da Instância da sua Evolution API.");
                    return;
                }
                
                setSendingMsg(lead.id);
                try {
                    let phoneNum = (lead.phone || '').replace(/\D/g, '');
                    if (phoneNum.length === 10 || phoneNum.length === 11) { phoneNum = '55' + phoneNum; }

                    const baseUrl = settings.evolutionApiUrl.trim().replace(/\/$/, '');
                    const apiKey = settings.evolutionApiKey.trim();
                    const url = `${baseUrl}/message/sendText/${settings.evolutionInstance.trim()}`;
                    
                    const valorInteresse = lead.type === 'Funil' ? lead.desiredCredit : lead.interestedCredit;
                    let textMessage = (settings.evolutionMessage || '')
                        .replace('{nome}', (lead.name || '').split(' ')[0])
                        .replace('{credito}', formatCurrency(valorInteresse));

                    const payload = {
                        number: phoneNum,
                        text: textMessage,
                        options: { delay: 1200, presence: "composing" },
                        textMessage: { text: textMessage }
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json', 
                            'apikey': apiKey,
                            'Authorization': `Bearer ${apiKey}` 
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    if (response.ok) {
                        alert(`Mensagem disparada com sucesso para ${lead.name}!`);
                    } else { 
                        const errText = await response.text();
                        try {
                            const err = JSON.parse(errText);
                            alert("A API rejeitou o disparo.\nMotivo: " + (err.response?.message || err.message || JSON.stringify(err)));
                        } catch(e) {
                            alert("A API rejeitou o disparo.\nResposta do servidor: " + errText);
                        }
                    }
                } catch (error) { 
                    console.error("Erro Evolution:", error); 
                    alert(`O navegador não conseguiu conectar com a sua API Evolution.\n\nVerifique:\n1. A URL da API tem HTTPS?\n2. O seu servidor Evolution possui bloqueio de segurança CORS?\n\nDetalhe técnico: ${error.message}`); 
                }

                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {leads.length === 0 ? <tr><td colSpan="4" className="p-12 text-center text-slate-400 font-medium">Nenhum dado registrado até o momento.</td></tr> : leads.map((lead) => (
                                    <tr key={lead.id} className="hover:bg-slate-50/80 transition-colors">
                                        <td className="px-6 py-5 text-xs text-slate-500">

                                            </span><br/>

                                        <td className="px-6 py-5">
                                            <p className="font-bold text-slate-900 text-base">{lead.name}</p>
                                            <a href={`https://wa.me/55${lead.phone.replace(/\D/g,'')}`} target="_blank" rel="noreferrer" className="text-emerald-600 hover:text-emerald-700 hover:underline flex items-center gap-1 mt-1 font-bold"><i className="ph ph-whatsapp-logo text-lg"></i> {lead.phone}</a>

                                                    <>

                                        <td className="px-6 py-5 text-right align-middle">

                                            >

        function AdminLetters({ letters, settings, onAdd, onUpdate, onDelete }) {
            const availableStatuses = (settings && settings.statuses && settings.statuses.length > 0) ? settings.statuses : [
                { name: 'Disponível', color: '#10b981' }, { name: 'Contemplada', color: '#8b5cf6' }, { name: 'Reservada', color: '#f59e0b' }

                e.preventDefault();

                    ...formData,

                    entry: formData.entry ? parseFloat(formData.entry) : 0, 
                    term: formData.term ? parseInt(formData.term) : 0, 
                    installment: formData.installment ? parseFloat(formData.installment) : 0
                };

                if (editingId) {
                    await onUpdate(editingId, processedData);
                } else {
                    await onAdd(processedData);
                }
                
                handleCancel();
            };

            const handleEditClick = (letter) => {
                setFormData({
                    code: letter.code || '',
                    category: letter.category || 'Imóvel',
                    tipoCota: letter.tipoCota || 'Contemplada',
                    credit: letter.credit || '',
                    entry: letter.entry || '',
                    term: letter.term || '',
                    installment: letter.installment || '',
                    adm: letter.adm || '',
                    status: letter.status || availableStatuses[0].name,
                    bankLogo: letter.bankLogo || ''
                });
                setEditingId(letter.id);
                setShowForm(true);
            };

            const handleCancel = () => {
                setShowForm(false); 
                setEditingId(null);
                setFormData(initialForm);
            };

            const handleFile = async (e) => { const file = e.target.files[0]; if(file) setFormData({...formData, bankLogo: await fileToBase64(file)}); };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200">

                    {showForm && (
                        <form onSubmit={handleSubmit} className="bg-white p-8 rounded-2xl shadow-lg border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in slide-in-from-top-4">

                            {/* Linha 1 */}
                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Código de Identificação</label><input type="text" value={formData.code} onChange={e=>setFormData({...formData, code: e.target.value})} className="w-full bg-slate-50 text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red focus:border-transparent" placeholder="Ex: 8832" /></div>
                            
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Tipo da Carta</label>
                                <select value={formData.tipoCota} onChange={e=>setFormData({...formData, tipoCota: e.target.value})} className="w-full bg-slate-50 text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red focus:border-transparent">
                                    <option value="Contemplada">Contemplada</option>
                                    <option value="Em Andamento">Em Andamento</option>
                                    <option value="Deságio">Deságio</option>
                                </select>
                            </div>

                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Categoria</label><select value={formData.category} onChange={e=>setFormData({...formData, category: e.target.value})} className="w-full bg-slate-50 text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red focus:border-transparent"><option>Imóvel</option><option>Veículo</option><option>Serviço</option></select></div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Status da Carta</label>
                                <select value={formData.status} onChange={e=>setFormData({...formData, status: e.target.value})} className="w-full bg-slate-50 text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red focus:border-transparent">
                                    {availableStatuses.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                    {availableStatuses.length === 0 && <option value="Disponível">Disponível</option>}
                                </select>
                            </div>
                            
                            {/* Valores com R$ fixo */}
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Crédito</label>
                                <div className="flex bg-slate-50 border border-slate-200 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-rf-red focus-within:border-transparent shadow-sm">
                                    <span className="flex items-center px-3 bg-slate-100 text-slate-400 font-bold text-sm border-r border-slate-200">R$</span>
                                    <input type="number" step="0.01" value={formData.credit} onChange={e=>setFormData({...formData, credit: e.target.value})} className="w-full bg-transparent p-3 text-sm font-bold text-slate-900 outline-none" placeholder="0.00"/>
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Entrada</label>
                                <div className="flex bg-slate-50 border border-slate-200 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-rf-red focus-within:border-transparent shadow-sm">
                                    <span className="flex items-center px-3 bg-slate-100 text-slate-400 font-bold text-sm border-r border-slate-200">R$</span>
                                    <input type="number" step="0.01" value={formData.entry} onChange={e=>setFormData({...formData, entry: e.target.value})} className="w-full bg-transparent p-3 text-sm font-bold text-slate-900 outline-none" placeholder="0.00" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Valor da Parcela</label>
                                <div className="flex bg-slate-50 border border-slate-200 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-rf-red focus-within:border-transparent shadow-sm">
                                    <span className="flex items-center px-3 bg-slate-100 text-slate-400 font-bold text-sm border-r border-slate-200">R$</span>
                                    <input type="number" step="0.01" value={formData.installment} onChange={e=>setFormData({...formData, installment: e.target.value})} className="w-full bg-transparent p-3 text-sm font-bold text-slate-900 outline-none" placeholder="0.00" />
                                </div>
                            </div>

                            {/* Informações Extras */}
                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Parcelas (Qtd)</label><input type="number" value={formData.term} onChange={e=>setFormData({...formData, term: e.target.value})} className="w-full bg-slate-50 text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red focus:border-transparent" placeholder="Ex: 180" /></div>
                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Admin. / Banco</label><input type="text" value={formData.adm} onChange={e=>setFormData({...formData, adm: e.target.value})} className="w-full bg-slate-50 text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red focus:border-transparent" placeholder="Ex: Itaú" /></div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Logo do Banco (Arquivo)</label>
                                {formData.bankLogo && <img src={formData.bankLogo} className="h-8 mb-2 border border-slate-200 p-1 rounded bg-white" />}
                                <input type="file" accept="image/*" onChange={handleFile} className="w-full text-xs font-medium bg-slate-50 border border-slate-200 rounded-lg p-2 file:mr-2 file:py-1 file:px-3 file:rounded-md file:border-0 file:bg-slate-900 file:text-white cursor-pointer" />
                            </div>
                            
                            <div className="col-span-full mt-4 pt-4 border-t border-slate-100 flex justify-end">
                                <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-10 rounded-xl shadow-md transition-colors text-sm flex items-center gap-2">
                                    <i className="ph ph-check-circle text-lg"></i> {editingId ? 'Salvar Alterações' : 'Salvar no Banco'}
                                </button>
                            </div>
                        </form>
                    )}

                    {/* Tabela Admin Repaginada */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                    <tr>
                                        <th className="p-5 font-bold text-xs uppercase tracking-wider">Código/Admin</th>
                                        <th className="p-5 font-bold text-xs uppercase tracking-wider">Crédito</th>
                                        <th className="p-5 font-bold text-xs uppercase tracking-wider">Entrada</th>
                                        <th className="p-5 font-bold text-xs uppercase tracking-wider">Parcelas</th>
                                        <th className="p-5 font-bold text-xs uppercase tracking-wider">Status</th>
                                        <th className="p-5 font-bold text-xs uppercase tracking-wider text-right">Ação</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-slate-700">
                                    {letters.length === 0 ? (
                                        <tr><td colSpan="6" className="text-center py-12 font-medium text-slate-400">Não há cartas cadastradas no momento.</td></tr>
                                    ) : (
                                    letters.map(l => (
                                        <tr key={l.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-5">
                                                <div className="font-bold text-slate-900 text-base">{l.code || 'S/N'}</div>
                                                <div className="text-xs font-medium mt-1 text-slate-500 flex items-center gap-2">
                                                    {l.bankLogo && <img src={l.bankLogo} className="h-5 object-contain mix-blend-multiply" />}
                                                    {!l.bankLogo && (l.adm || '-')}
                                                    <span className="opacity-50">|</span> {l.tipoCota || 'Contemplada'}
                                                </div>
                                            </td>
                                            <td className="p-5 font-black text-slate-900 text-base">{formatCurrency(l.credit)}</td>
                                            <td className="p-5 font-bold text-slate-700">{formatCurrency(l.entry)}</td>
                                            <td className="p-5 font-bold text-rf-red">{l.term || 0}x {formatCurrency(l.installment)}</td>
                                            <td className="p-5"><StatusBadge status={l.status} settings={settings} /></td>
                                            <td className="p-5 text-right">
                                                <button onClick={() => handleEditClick(l)} className="text-slate-400 hover:text-emerald-600 bg-white border border-slate-200 hover:border-emerald-600 p-2 rounded-lg transition-colors shadow-sm mr-2" title="Editar Carta"><i className="ph ph-pencil-simple text-lg"></i></button>
                                                <button onClick={() => { if(confirm('Excluir esta carta definitivamente?')) onDelete(l.id); }} className="text-slate-400 hover:text-rf-red bg-white border border-slate-200 hover:border-rf-red p-2 rounded-lg transition-colors shadow-sm" title="Excluir"><i className="ph ph-trash text-lg"></i></button>
                                            </td>
                                        </tr>
                                    )))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminSettings({ settings, onSave }) {
            const [localSet, setLocalSet] = useState(settings);
            const [saved, setSaved] = useState(false);
            const [testingApi, setTestingApi] = useState(false);

            const handleSave = async (e) => {
                e.preventDefault();
                await onSave(localSet);
                setSaved(true); setTimeout(() => setSaved(false), 3000);
            };

            const handleImg = async (e, key) => { const f = e.target.files[0]; if(f) setLocalSet({...localSet, [key]: await fileToBase64(f)}); };
            const handlePartner = async (e) => { const f = e.target.files[0]; if(f) setLocalSet({...localSet, partnerLogos: [...localSet.partnerLogos, await fileToBase64(f)]}); };

            // Funções para gerenciar os Status Personalizados
            const addStatus = () => setLocalSet({...localSet, statuses: [...(localSet.statuses || []), { name: 'Novo Status', color: '#64748b' }]});
            const updateStatus = (index, field, value) => {
                const newSt = [...localSet.statuses];
                newSt[index][field] = value;
                setLocalSet({...localSet, statuses: newSt});
            };
            const removeStatus = (index) => setLocalSet({...localSet, statuses: localSet.statuses.filter((_, i) => i !== index)});

            const handleTestEvolutionApi = async () => {
                if (!localSet.evolutionInstance || !localSet.evolutionApiKey || !localSet.evolutionApiUrl) {
                    alert("Por favor, preencha os 3 campos obrigatórios da API (Nome da Instância, API Key e URL) antes de testar.");
                    return;
                }

                const testPhone = prompt("Digite o número do WhatsApp que VAI RECEBER o teste (com DDD, ex: 5511999999999):");
                if (!testPhone) return;

                setTestingApi(true);
                try {
                    let phoneNum = testPhone.replace(/\D/g, '');
                    if (phoneNum.length === 10 || phoneNum.length === 11) { phoneNum = '55' + phoneNum; }

                    const baseUrl = localSet.evolutionApiUrl.trim().replace(/\/$/, '');
                    const apiKey = localSet.evolutionApiKey.trim();
                    const url = `${baseUrl}/message/sendText/${localSet.evolutionInstance.trim()}`;
                    
                    const msgTeste = "✅ Olá! Este é um teste automático do seu Painel RF Consórcio. Sua integração com a Evolution API está funcionando perfeitamente!";

                    const payload = {
                        number: phoneNum,
                        text: msgTeste,
                        options: { delay: 1200, presence: "composing" },
                        textMessage: { text: msgTeste }
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json', 
                            'apikey': apiKey,
                            'Authorization': `Bearer ${apiKey}` 
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    if (response.ok) {
                        alert("Mensagem de teste disparada com sucesso! Verifique o WhatsApp digitado.");
                    } else {
                        const errText = await response.text();
                        try {
                            const err = JSON.parse(errText);
                            alert("A API rejeitou o disparo de teste.\nMotivo: " + (err.response?.message || err.message || JSON.stringify(err)));
                        } catch (e) {
                            alert("A API rejeitou o disparo.\nResposta: " + errText);
                        }
                    }
                } catch (error) {
                    console.error("Erro no teste da Evolution API:", error);
                    alert(`Erro de conexão com a API.\n\nDetalhe técnico: ${error.message}\n\nIsto geralmente ocorre se:\n1. O link da sua API está incorreto (faltou o https:// ?)\n2. A Evolution API está bloqueando o acesso direto do seu navegador (Erro de CORS).`);
                }
                setTestingApi(false);
            };

            return (
                <form onSubmit={handleSave} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-10">
                    <div className="flex justify-between items-center border-b border-slate-100 pb-5">
                        <h2 className="text-xl font-bold text-slate-900">Editar Site & Textos</h2>
                        {saved && <span className="bg-emerald-50 text-emerald-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 border border-emerald-100 shadow-sm"><i className="ph ph-check-circle text-lg"></i> Atualizado na Nuvem!</span>}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="space-y-5">
                            <h3 className="text-sm font-black text-rf-red uppercase tracking-widest mb-3 flex items-center gap-2"><i className="ph ph-text-aa text-lg"></i> Comunicação</h3>
                            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Nome Fantasia</label><input type="text" value={localSet.companyName} onChange={e=>setLocalSet({...localSet, companyName: e.target.value})} className="w-full text-slate-900 font-medium border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" /></div>
                                    <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">CNPJ</label><input type="text" value={localSet.cnpj} onChange={e=>setLocalSet({...localSet, cnpj: e.target.value})} className="w-full text-slate-900 font-medium border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" placeholder="00.000.000/0001-00" /></div>
                                </div>
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">WhatsApp (Recepção de Leads)</label><input type="text" value={localSet.adminPhone} onChange={e=>setLocalSet({...localSet, adminPhone: e.target.value})} className="w-full text-slate-900 font-medium border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" placeholder="Ex: 5511999999999" /></div>
                                <div className="flex gap-4">
                                    <div className="flex-1"><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Título Capa (Hero)</label><input type="text" value={localSet.heroTitle} onChange={e=>setLocalSet({...localSet, heroTitle: e.target.value})} className="w-full text-slate-900 font-medium border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" /></div>
                                    <div className="w-32"><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Cor do Menu</label><div className="flex bg-white border border-slate-200 rounded-lg overflow-hidden h-[46px] relative"><input type="color" value={safeColor(localSet.headerBgColor, '#ffffff')} onChange={e=>setLocalSet({...localSet, headerBgColor: e.target.value})} className="absolute inset-0 w-[200%] h-[200%] -top-1/2 -left-1/2 cursor-pointer opacity-0" /><div className="w-full h-full pointer-events-none" style={{backgroundColor: safeColor(localSet.headerBgColor, '#ffffff')}}></div></div></div>
                                </div>
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Subtítulo Capa</label><textarea value={localSet.heroSubtitle} onChange={e=>setLocalSet({...localSet, heroSubtitle: e.target.value})} className="w-full text-slate-900 font-medium border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" rows="2"></textarea></div>
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Texto Rodapé / A Empresa</label><textarea value={localSet.aboutText} onChange={e=>setLocalSet({...localSet, aboutText: e.target.value})} className="w-full text-slate-900 font-medium border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" rows="3"></textarea></div>
                            </div>
                        </div>

                        <div className="space-y-5">
                            <h3 className="text-sm font-black text-rf-red uppercase tracking-widest mb-3 flex items-center gap-2"><i className="ph ph-sliders-horizontal text-lg"></i> Simulador</h3>
                            <div className="grid grid-cols-2 gap-4 bg-slate-50 p-6 rounded-xl border border-slate-200">
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Crédito Min</label><input type="number" value={localSet.funnelMinCredit} onChange={e=>setLocalSet({...localSet, funnelMinCredit: e.target.value})} className="w-full text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" /></div>
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Crédito Max</label><input type="number" value={localSet.funnelMaxCredit} onChange={e=>setLocalSet({...localSet, funnelMaxCredit: e.target.value})} className="w-full text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" /></div>
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Parcela Min</label><input type="number" value={localSet.funnelMinInstallment} onChange={e=>setLocalSet({...localSet, funnelMinInstallment: e.target.value})} className="w-full text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" /></div>
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Parcela Max</label><input type="number" value={localSet.funnelMaxInstallment} onChange={e=>setLocalSet({...localSet, funnelMaxInstallment: e.target.value})} className="w-full text-slate-900 font-bold border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-rf-red" /></div>
                            </div>

                            <h3 className="text-sm font-black text-rf-red uppercase tracking-widest mt-8 mb-3 flex items-center gap-2"><i className="ph ph-image text-lg"></i> Arquivos Visuais</h3>
                            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 space-y-6">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Logo Principal (Topo e Rodapé)</label>
                                    {localSet.mainLogo && <img src={localSet.mainLogo} className="h-12 mb-3 bg-white p-2 rounded border border-slate-200 shadow-sm" />}
                                    <div className="flex items-center gap-3">
                                        <input type="file" onChange={e=>handleImg(e, 'mainLogo')} className="text-xs font-medium file:mr-2 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:bg-slate-900 file:text-white cursor-pointer" />
                                        <button type="button" onClick={()=>setLocalSet({...localSet, mainLogo: null})} className="text-xs font-bold text-rf-red hover:underline">Remover</button>
                                    </div>
                                </div>
                                <div className="pt-4 border-t border-slate-200">
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Imagem de Fundo (Capa Hero)</label>
                                    {localSet.heroImage && <img src={localSet.heroImage} className="h-20 w-full object-cover mb-3 rounded-lg border border-slate-200 shadow-sm" />}
                                    <div className="flex items-center gap-3">
                                        <input type="file" onChange={e=>handleImg(e, 'heroImage')} className="text-xs font-medium file:mr-2 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:bg-slate-900 file:text-white cursor-pointer" />
                                        <button type="button" onClick={()=>setLocalSet({...localSet, heroImage: null})} className="text-xs font-bold text-rf-red hover:underline">Remover</button>
                                    </div>
                                </div>
                                <div className="pt-4 border-t border-slate-200">
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-3">Logos Bancos Parceiros (Aparecem no Rodapé)</label>
                                    <div className="flex flex-wrap gap-3 mb-3">
                                        {localSet.partnerLogos.map((l,i)=><div key={i} className="relative bg-white border border-slate-200 p-2 rounded-lg w-16 h-10 shadow-sm flex items-center justify-center group"><img src={l} className="max-h-full max-w-full object-contain"/><button type="button" onClick={()=>setLocalSet({...localSet, partnerLogos: localSet.partnerLogos.filter((_,idx)=>idx!==i)})} className="absolute -top-2 -right-2 text-white bg-rf-red rounded-full p-1 opacity-0 group-hover:opacity-100 transition shadow-md"><i className="ph ph-x text-xs"></i></button></div>)}
                                        <label className="border-2 border-dashed border-slate-300 rounded-lg w-16 h-10 flex items-center justify-center cursor-pointer hover:bg-slate-100 hover:border-slate-400 transition text-slate-400 hover:text-slate-600">
                                            <input type="file" onChange={handlePartner} className="hidden" />
                                            <i className="ph ph-plus text-lg"></i>
                                        </label>
                                    </div>
                                    <p className="text-[10px] text-slate-500 font-medium">Clique no botão de + para adicionar as imagens dos bancos que trabalham com você.</p>
                                </div>
                            </div>
                        </div>

                        {/* Integração de Status Personalizado */}
                        <div className="md:col-span-2 mt-2">
                            <h3 className="text-sm font-black text-rf-red uppercase tracking-widest mb-3 flex items-center gap-2">
                                <i className="ph ph-tag text-xl"></i> Status das Cartas Personalizados
                            </h3>
                            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 shadow-inner">
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                    {(localSet.statuses || []).map((st, i) => (
                                        <div key={i} className="flex gap-3 items-center bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                                            <input type="text" value={st.name} onChange={e => updateStatus(i, 'name', e.target.value)} className="flex-1 text-slate-900 font-bold border-none outline-none focus:ring-0 text-sm p-0" placeholder="Nome do Status" />
                                            <div className="w-10 h-10 rounded-lg overflow-hidden border border-slate-200 shadow-sm relative shrink-0">
                                                <input type="color" value={safeColor(st.color, '#000000')} onChange={e => updateStatus(i, 'color', e.target.value)} className="absolute inset-0 w-[200%] h-[200%] -top-1/2 -left-1/2 cursor-pointer opacity-0" />
                                                <div className="w-full h-full pointer-events-none" style={{ backgroundColor: safeColor(st.color, '#000000') }}></div>
                                            </div>
                                            <button type="button" onClick={() => removeStatus(i)} className="text-slate-400 hover:text-rf-red transition-colors shrink-0 p-1"><i className="ph ph-trash text-lg"></i></button>
                                        </div>
                                    ))}
                                </div>
                                <button type="button" onClick={addStatus} className="text-sm font-bold text-emerald-600 hover:text-emerald-700 flex items-center gap-1.5 mt-5 bg-emerald-50 px-4 py-2 rounded-lg border border-emerald-100 transition-colors">
                                    <i className="ph ph-plus-circle text-lg"></i> Criar Novo Status
                                </button>
                                <p className="text-xs text-slate-500 font-medium mt-3">Adicione os status que você usa na sua operação. As cores escolhidas aparecerão nas etiquetas (badges) do site e do sistema.</p>
                            </div>
                        </div>

                        {/* Integração Evolution API */}
                        <div className="md:col-span-2 mt-2">
                            <h3 className="text-sm font-black text-emerald-700 uppercase tracking-widest mb-3 flex items-center gap-2">
                                <i className="ph ph-whatsapp-logo text-xl"></i> Automação WhatsApp (Evolution API)
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-5 bg-emerald-50/50 p-6 rounded-xl border border-emerald-100">
                                <div className="md:col-span-1">
                                    <label className="block text-xs font-bold text-slate-600 uppercase mb-1.5">Nome da Instância</label>
                                    <input type="text" value={localSet.evolutionInstance || ''} onChange={e=>setLocalSet({...localSet, evolutionInstance: e.target.value})} className="w-full text-slate-900 font-medium border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Ex: rf_whatsapp" />
                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-xs font-bold text-slate-600 uppercase mb-1.5">API Key Global</label>
                                    <input type="text" value={localSet.evolutionApiKey || ''} onChange={e=>setLocalSet({...localSet, evolutionApiKey: e.target.value})} className="w-full text-slate-900 font-mono border border-slate-200 rounded-lg p-3 text-xs outline-none focus:ring-2 focus:ring-emerald-500 bg-white" />
                                </div>
                                <div className="md:col-span-3">
                                    <label className="block text-xs font-bold text-slate-600 uppercase mb-1.5">URL do Servidor Evolution</label>
                                    <input type="text" value={localSet.evolutionApiUrl || ''} onChange={e=>setLocalSet({...localSet, evolutionApiUrl: e.target.value})} className="w-full text-slate-900 font-medium border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500" />
                                </div>
                                <div className="md:col-span-3">
                                    <label className="block text-xs font-bold text-slate-600 uppercase mb-1.5">
                                        Texto Padrão do Disparo (Variáveis: <code className="text-rf-red bg-white px-1 border border-slate-200 rounded">{'{nome}'}</code>, <code className="text-rf-red bg-white px-1 border border-slate-200 rounded">{'{credito}'}</code>)
                                    </label>
                                    <textarea value={localSet.evolutionMessage || ''} onChange={e=>setLocalSet({...localSet, evolutionMessage: e.target.value})} className="w-full text-slate-900 font-medium border border-slate-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500" rows="2"></textarea>
                                </div>
                                
                                {/* BOTÃO DE TESTE DA API */}
                                <div className="md:col-span-3 mt-2 pt-5 border-t border-emerald-200/50 flex justify-end">
                                    <button 
                                        type="button" 
                                        onClick={handleTestEvolutionApi} 
                                        disabled={testingApi} 
                                        className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-6 rounded-lg transition-all shadow-md flex items-center gap-2 text-sm disabled:opacity-50"
                                    >
                                        <i className="ph ph-paper-plane-tilt text-lg"></i> 
                                        {testingApi ? 'Enviando teste...' : 'Enviar Mensagem de Teste'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="pt-6 text-right border-t border-slate-100 flex justify-end">
                        <button type="submit" className="bg-slate-900 text-white font-bold py-4 px-10 rounded-xl hover:bg-rf-red transition-all shadow-lg hover:shadow-xl flex items-center gap-2">
                            <i className="ph ph-floppy-disk text-xl"></i> Salvar e Atualizar Site
                        </button>
                    </div>
                </form>
            );
        }

        // Renderiza no HTML
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
